name: Build AyuGram4A APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_MAXSIZE: "10G"
      CCACHE_HARDLINK: "true"

    steps:
      - name: Free up disk space
        run: |
          sudo apt-get update
          sudo apt-get remove -y '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli firefox mono-devel libgl1-mesa-dri 2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          sudo rm -rf /usr/share/dotnet/ /usr/local/graalvm/ /usr/local/.ghcup/ /usr/local/share/powershell /usr/local/share/chromium /usr/local/lib/node_modules /opt/ghc 2>/dev/null || true
          df -h

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: AyuGram/AyuGram4A
          ref: rewrite
          path: source
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;21.4.7075529"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/21.4.7075529" >> $GITHUB_ENV

      - name: Install build tools
        run: |
          sdkmanager "build-tools;33.0.1" "platforms;android-33"

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ccache
          restore-keys: ccache

      - name: Install native build deps
        run: |
          sudo apt-get install -y bison gcc make curl ninja-build ccache

      - name: Create proprietary stubs
        run: |
          mkdir -p source/TMessagesProj/src/main/java/com/radolyn/ayugram/proprietary
          cat > source/TMessagesProj/src/main/java/com/radolyn/ayugram/proprietary/AyuHistoryHook.java << 'JAVA'
          package com.radolyn.ayugram.proprietary;
          import android.util.SparseArray;
          import org.telegram.messenger.MessageObject;
          import java.util.ArrayList;
          public class AyuHistoryHook {
              public static class MinMaxIds {
                  public int first;
                  public int second;
                  public MinMaxIds(int f, int s) { first = f; second = s; }
              }
              public static MinMaxIds getMinAndMaxIds(ArrayList<MessageObject> messArr) {
                  int min = Integer.MAX_VALUE;
                  int max = Integer.MIN_VALUE;
                  if (messArr != null) {
                      for (MessageObject obj : messArr) {
                          int id = obj.messageOwner.id;
                          if (id < min) min = id;
                          if (id > max) max = id;
                      }
                  }
                  return new MinMaxIds(min, max);
              }
              public static void doHook(int currentAccount, ArrayList<MessageObject> messArr,
                                         SparseArray<MessageObject> messagesDict,
                                         int startId, int endId, long dialogId,
                                         int limit, int topicId, boolean isSecretChat) {}
          }
          JAVA
          cat > source/TMessagesProj/src/main/java/com/radolyn/ayugram/proprietary/AyuMessageUtils.java << 'JAVA'
          package com.radolyn.ayugram.proprietary;
          import com.radolyn.ayugram.database.entities.EditedMessage;
          import com.radolyn.ayugram.messages.AyuSavePreferences;
          import org.telegram.messenger.MessageObject;
          public class AyuMessageUtils {
              public static void map(AyuSavePreferences prefs, EditedMessage entity) {}
              public static void mapMedia(AyuSavePreferences prefs, EditedMessage entity, boolean force) {}
              public static void map(EditedMessage entity, MessageObject msg, int currentAccount) {}
              public static void mapMedia(EditedMessage entity, MessageObject msg) {}
          }
          JAVA
          echo "Proprietary stubs created"

      - name: Create API_KEYS
        run: |
          cat > source/API_KEYS << 'EOF'
          APP_ID = 6
          APP_HASH = "eb06d4abfb49dc3eeb1aeb98ae0f581e"
          MAPS_V2_API = ""

          SIGNING_KEY_PASSWORD = "redogram"
          SIGNING_KEY_ALIAS = "redogram"
          SIGNING_KEY_STORE_PASSWORD = "redogram"
          EOF
          cat source/API_KEYS

      - name: Generate signing keystore
        run: |
          cd source
          rm -f TMessagesProj/config/extera.jks
          keytool -genkeypair -v \
            -keystore TMessagesProj/config/extera.jks \
            -storetype JKS \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias redogram \
            -storepass redogram \
            -keypass redogram \
            -dname "CN=RedoGram,OU=Dev,O=RedoGram,L=Unknown,ST=Unknown,C=US"
          ls -la TMessagesProj/config/extera.jks

      - name: Grant execute permission for gradlew
        run: chmod +x source/gradlew

      - name: Build with Gradle
        working-directory: source
        run: |
          ./gradlew assembleAfatRelease --no-daemon --no-configuration-cache --stacktrace 2>&1 | tee build.log
        continue-on-error: true

      - name: Check build output
        working-directory: source
        run: |
          echo "=== Build log tail ==="
          tail -100 build.log
          echo ""
          echo "=== APK output ==="
          find TMessagesProj/build/outputs -name "*.apk" 2>/dev/null || echo "No APK found"
          echo ""
          echo "=== Build directory ==="
          ls -la TMessagesProj/build/outputs/apk/ 2>/dev/null || echo "No APK directory"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: AyuGram4A-APK
          path: |
            source/TMessagesProj/build/outputs/apk/**/*.apk
          retention-days: 7
          if-no-files-found: warn
